<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>RTF Editor - Kaique Durce</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    /* Estilo geral */
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #f5f5f5;
      padding: 40px;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 30px;
      color: #00adb5;
    }

    /* Botão voltar */
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      background-color: #00adb5;
      color: #121212;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.2s, transform 0.2s;
    }

    .back-btn:hover {
      background-color: #06c2ca;
      transform: translateY(-2px);
    }

    /* Toolbar */
    #toolbar {
      margin-bottom: 10px;
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Editor container */
    #editor-container {
      height: 300px;
      margin-bottom: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px;
    }

    /* Botões */
    button {
      background-color: #00adb5;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: #121212;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.2s;
    }

    button:hover{
      background-color: #06c2ca;
      transform: translateY(-2px);
    }

    #titlecase-button {
    font-weight: bold;
    font-family: Arial, sans-serif;
    background-color: #00bcd4; /* mesma cor que você usou */
    color: black;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    display: flex;             /* flexbox para centralizar */
    align-items: center;       /* centraliza verticalmente */
    justify-content: center;   /* centraliza horizontalmente */
    font-size: 14px;           /* ajusta tamanho da fonte */
    height: 28px;              /* mesmo padrão dos botões do Quill */
    width: 28px;               /* deixa quadrado como os ícones */
    }

#titlecase-button:hover {
  background-color: #0097a7;
}


    /* Botão exportar */
    #export-btn {
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <!-- Botão voltar -->
  <a href="../index.html" class="back-btn">← Voltar para Portfólio</a>

  <h2>Editor RTF com Quill.js</h2>

  <!-- Toolbar personalizada -->
  <div id="toolbar">
    <span class="ql-formats">
      <button class="ql-bold"></button>
      <button class="ql-italic"></button>
      <button class="ql-underline"></button>
      <button class="ql-strike"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-blockquote"></button>
      <button class="ql-code-block"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-link"></button>
      <button class="ql-image"></button>
      <button class="ql-video"></button>
      <button class="ql-formula"></button>
    </span>
    <span class="ql-formats">
      <select class="ql-header">
        <option selected></option>
        <option value="1"></option>
        <option value="2"></option>
      </select>
      <select class="ql-size">
        <option value="small"></option>
        <option selected></option>
        <option value="large"></option>
        <option value="huge"></option>
      </select>
    </span>
    <span class="ql-formats">
      <button class="ql-list" value="ordered"></button>
      <button class="ql-list" value="bullet"></button>
      <button class="ql-list" value="check"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-indent" value="-1"></button>
      <button class="ql-indent" value="+1"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-script" value="sub"></button>
      <button class="ql-script" value="super"></button>
    </span>
    <span class="ql-formats">
      <select class="ql-align"></select>
      <select class="ql-color"></select>
      <select class="ql-background"></select>
    </span>
    <span class="ql-formats">
      <select class="ql-font"></select>
    </span>
    <span class="ql-formats">
      <button class="ql-clean"></button>
    </span>

    <!-- Botão customizado Aa -->
    <span class="ql-formats">
      <button id="titlecase-button" title="Converter para Iniciais Maiúsculas">Aa</button>
    </span>
  </div>

  <!-- Editor -->
  <div id="editor-container"></div>

  <!-- Botão para exportar RTF -->
  <button id="export-btn" onclick="exportAsRTF()">Exportar como RTF</button>

  <!-- Scripts -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script>
    // Inicializa o editor com toolbar customizada
    const quill = new Quill('#editor-container', {
      theme: 'snow',
      modules: {
        toolbar: '#toolbar'
      }
    });

    // Exporta como RTF (texto puro com quebra de linha)
    function exportAsRTF() {
      const text = quill.getText().replace(/\n/g, '\\par ');
      const rtfContent = `{\\rtf1\\ansi\\deff0 {\\fonttbl {\\f0 Arial;}}\\f0\\fs24 ${text}}`;

      const blob = new Blob([rtfContent], { type: 'application/rtf' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = 'documento.rtf';
      link.click();

      URL.revokeObjectURL(url);
    }

    // Converte o texto para Title Case
    document.getElementById('titlecase-button').addEventListener('click', () => {
      const text = quill.getText();
      const titleCased = text
        .toLowerCase()
        .replace(/\w\S*/g, (w) => w.charAt(0).toUpperCase() + w.slice(1));

      quill.setText(titleCased);
    });
  </script>
</body>
</html>
